name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet restore GameLibrary.sln
      - run: dotnet format GameLibrary.sln --verify-no-changes --no-restore
      - run: dotnet build GameLibrary.sln --configuration Release --no-restore
      - run: dotnet test GameLibrary.sln --configuration Release --no-build
      - uses: gitleaks/gitleaks-action@v2
